<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>แดชบอร์ดข้อมูลลูกค้า</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#081833;
    --navy:#0d2247;
    --navy-panel:#123163;
    --navy-line:#1e3f78;
    --gold:#e6b325;
    --gold-soft:#f4d777;
    --cream:#f3ecd9;
    --muted:#89a0c4;
    --green:#2f9e58;
    --green-soft:#1c6b3d;
    --red:#c0392b;
    --red-soft:#7a1f18;
    --orange:#d9822b;
    --blue:#3b76d9;
    --magenta:#c23b8f;
    --gray:#5b6c85;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Sarabun',sans-serif;
    background:radial-gradient(circle at 20% 0%, var(--navy) 0%, var(--navy-deep) 60%);
    color:var(--cream);
    min-height:100vh;
    padding:18px;
  }
  h1,h2,h3{font-family:'Kanit',sans-serif; margin:0;}
  .wrap{max-width:1200px;margin:0 auto;}
  .header{
    text-align:center;
    padding:18px 10px 22px;
    position:relative;
  }
  .header::after{
    content:"";
    display:block;
    width:120px;height:3px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    margin:14px auto 0;
  }
  .header h1{
    font-size:26px;
    letter-spacing:1px;
    color:var(--gold-soft);
    text-shadow:0 2px 10px rgba(230,179,37,0.25);
  }
  .header .sub{color:var(--muted);font-size:13px;margin-top:6px;}

  .tabs{
    display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;
  }
  .tab-btn{
    background:var(--navy-panel);
    border:1px solid var(--navy-line);
    color:var(--muted);
    padding:10px 18px;
    border-radius:10px 10px 0 0;
    font-family:'Kanit',sans-serif;
    font-size:14px;
    cursor:pointer;
    transition:.15s;
  }
  .tab-btn.active{
    background:var(--gold);
    color:var(--navy-deep);
    border-color:var(--gold);
    font-weight:600;
  }
  .tab-btn:hover:not(.active){color:var(--cream);border-color:var(--gold-soft);}

  .panel{
    background:linear-gradient(180deg,var(--navy-panel),var(--navy));
    border:1px solid var(--navy-line);
    border-radius:0 12px 12px 12px;
    padding:18px;
    margin-bottom:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
  }

  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;}
  .field{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted);}
  .field input,.field select{
    background:var(--navy-deep);
    border:1px solid var(--navy-line);
    color:var(--cream);
    padding:8px 10px;
    border-radius:8px;
    font-family:'Sarabun',sans-serif;
    font-size:13px;
    min-width:120px;
  }
  .field input:focus,.field select:focus{outline:none;border-color:var(--gold);}
  .btn{
    background:var(--gold);
    color:var(--navy-deep);
    border:none;
    padding:9px 18px;
    border-radius:8px;
    font-family:'Kanit',sans-serif;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
    transition:.15s;
  }
  .btn:hover{background:var(--gold-soft);}
  .btn.secondary{background:transparent;border:1px solid var(--navy-line);color:var(--cream);}
  .btn.secondary:hover{border-color:var(--gold-soft);color:var(--gold-soft);}
  .btn.danger{background:var(--red);color:#fff;}
  .btn.danger:hover{background:#e0453a;}
  .btn.tiny{padding:5px 10px;font-size:11px;border-radius:6px;}

  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  thead th{
    background:var(--gold);
    color:var(--navy-deep);
    font-family:'Kanit',sans-serif;
    padding:9px 6px;
    text-align:center;
    white-space:nowrap;
    position:sticky;top:0;
  }
  tbody td{
    padding:7px 6px;
    text-align:center;
    border-bottom:1px solid var(--navy-line);
    white-space:nowrap;
  }
  tbody tr:nth-child(even){background:rgba(255,255,255,0.02);}
  tbody tr.pinned{background:rgba(194,59,143,0.18);}
  .table-scroll{overflow-x:auto;border-radius:8px;border:1px solid var(--navy-line);}
  td input, td select{
    background:var(--navy-deep);
    border:1px solid var(--navy-line);
    color:var(--cream);
    padding:5px 6px;
    border-radius:6px;
    font-size:12px;
    width:100%;
    min-width:70px;
  }
  td input:focus, td select:focus{outline:none;border-color:var(--gold);}

  .badge{
    display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;
  }
  .badge.gray{background:var(--gray);}
  .badge.red{background:var(--red);}
  .badge.green{background:var(--green);}
  .badge.orange{background:var(--orange);}
  .badge.blue{background:var(--blue);}
  .badge.magenta{background:var(--magenta);}

  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
  .chip{
    background:var(--navy-deep);
    border:1px solid var(--navy-line);
    color:var(--muted);
    padding:5px 12px;
    border-radius:20px;
    font-size:12px;
    cursor:pointer;
  }
  .chip.active{background:var(--gold);color:var(--navy-deep);border-color:var(--gold);font-weight:600;}
  .chip:hover:not(.active){border-color:var(--gold-soft);color:var(--cream);}
  .chip .n{opacity:.75;margin-left:4px;}

  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;}
  .stat-card{
    background:var(--navy-deep);
    border:1px solid var(--navy-line);
    border-radius:10px;
    padding:14px;
    text-align:center;
  }
  .stat-card .num{font-family:'Kanit',sans-serif;font-size:22px;color:var(--gold-soft);font-weight:600;}
  .stat-card .lbl{font-size:11.5px;color:var(--muted);margin-top:4px;}

  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12.5px;}
  .bar-label{width:150px;flex-shrink:0;color:var(--muted);}
  .bar-track{flex:1;background:var(--navy-deep);border-radius:6px;height:16px;overflow:hidden;border:1px solid var(--navy-line);}
  .bar-fill{height:100%;border-radius:6px;}
  .bar-val{width:34px;text-align:right;color:var(--cream);}

  .empty{
    text-align:center;padding:30px 10px;color:var(--muted);font-size:13px;
  }
  .section-title{
    font-family:'Kanit',sans-serif;color:var(--gold-soft);font-size:15px;margin:0 0 12px;
    display:flex;align-items:center;gap:8px;
  }
  .section-title::before{content:"";width:4px;height:16px;background:var(--gold);border-radius:2px;}

  .save-note{font-size:11px;color:var(--muted);text-align:right;margin-top:6px;min-height:14px;}
  .footer-note{text-align:center;color:var(--muted);font-size:11.5px;margin-top:6px;}
  ::-webkit-scrollbar{height:8px;width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--navy-line);border-radius:4px;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const CALL_STATUS = ["", "ไม่มีหมายเลข", "ไม่รับสาย", "รับสาย", "รับสายแล้วตัดสาย"];
const DEPOSIT_STATUS = ["", "ไม่ฝาก", "ฝากประจำ", "ฝาก", "ไม่ฝากรอบนี้", "ผิดพลาด"];
const CALL_COLOR = {"ไม่มีหมายเลข":"gray","ไม่รับสาย":"red","รับสาย":"green","รับสายแล้วตัดสาย":"orange"};
const DEP_COLOR = {"ไม่ฝาก":"red","ฝากประจำ":"blue","ฝาก":"green","ไม่ฝากรอบนี้":"orange","ผิดพลาด":"magenta"};
const STORE_KEY = "customer-records-v1";
const SHARED = true; // visible to everyone who opens this dashboard

let state = {
  records: [],
  tab: "daily",
  selectedDate: todayStr(),
  selectedMonth: todayStr().slice(0,7),
  loaded: false,
  saveMsg: ""
};

function todayStr(){
  const d = new Date();
  const p = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function thaiDate(iso){
  if(!iso) return "-";
  const [y,m,d] = iso.split("-");
  const thYear = parseInt(y)+543;
  const months=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${thYear}`;
}
function thaiMonth(ym){
  if(!ym) return "-";
  const [y,m] = ym.split("-");
  const thYear = parseInt(y)+543;
  const months=["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
  return `${months[parseInt(m)-1]} ${thYear}`;
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fmtNum(n){ return (Number(n)||0).toLocaleString("th-TH"); }
function badge(cls, text){ return text ? `<span class="badge ${cls}">${text}</span>` : ""; }

async function loadData(){
  try{
    const res = await window.storage.get(STORE_KEY, SHARED);
    state.records = res && res.value ? JSON.parse(res.value) : [];
  }catch(e){
    state.records = [];
  }
  state.loaded = true;
  render();
}
async function saveData(){
  try{
    const ok = await window.storage.set(STORE_KEY, JSON.stringify(state.records), SHARED);
    state.saveMsg = ok ? "บันทึกแล้ว ✓" : "บันทึกไม่สำเร็จ";
  }catch(e){
    state.saveMsg = "บันทึกไม่สำเร็จ (เชื่อมต่อล้มเหลว)";
  }
  render();
  setTimeout(()=>{ state.saveMsg=""; const n=document.getElementById("saveNote"); if(n) n.textContent=""; }, 2500);
}

function addRecord(date){
  state.records.push({
    id: uid(),
    phone:"", name:"", lineId:"",
    regDate: date, followDate: date,
    callStatus:"", depositStatus:"",
    firstDeposit:"", billCount:"", billTotal:"",
    pinned:false
  });
  saveData();
}
function updateRecord(id, field, value){
  const r = state.records.find(r=>r.id===id);
  if(r){ r[field] = value; saveData(); }
}
function deleteRecord(id){
  state.records = state.records.filter(r=>r.id!==id);
  saveData();
}
function togglePin(id){
  const r = state.records.find(r=>r.id===id);
  if(r){ r.pinned = !r.pinned; saveData(); }
}

function recordsForDate(date){
  return state.records.filter(r=>r.followDate===date);
}
function recordsForMonth(ym){
  return state.records.filter(r=>(r.followDate||"").slice(0,7)===ym);
}
function distinctDates(){
  const s = new Set(state.records.map(r=>r.followDate).filter(Boolean));
  return Array.from(s).sort().reverse();
}
function distinctMonths(){
  const s = new Set(state.records.map(r=>(r.followDate||"").slice(0,7)).filter(Boolean));
  return Array.from(s).sort().reverse();
}
function summarize(list){
  const out = {
    count: list.length,
    firstDeposit: 0, billCount:0, billTotal:0,
    call:{}, deposit:{}
  };
  list.forEach(r=>{
    out.firstDeposit += Number(r.firstDeposit)||0;
    out.billCount += Number(r.billCount)||0;
    out.billTotal += Number(r.billTotal)||0;
    if(r.callStatus) out.call[r.callStatus] = (out.call[r.callStatus]||0)+1;
    if(r.depositStatus) out.deposit[r.depositStatus] = (out.deposit[r.depositStatus]||0)+1;
  });
  return out;
}
function distinctValues(field, defaults){
  const s = new Set(defaults.filter(Boolean));
  state.records.forEach(r=>{ if(r[field]) s.add(r[field]); });
  return Array.from(s);
}

function render(){
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="header">
      <h1>แดชบอร์ดข้อมูลลูกค้า</h1>
      <div class="sub">บันทึกข้อมูลรายวัน • สรุปผลรายวันและรายเดือน • ดูย้อนหลังได้ทุกวันที่เคยบันทึก</div>
    </div>
    <div class="tabs">
      ${tabBtn("daily","📋 บันทึกรายวัน")}
      ${tabBtn("daySummary","📊 สรุปรายวัน")}
      ${tabBtn("monthSummary","🗓️ สรุปรายเดือน")}
    </div>
    <div id="tabContent"></div>
    <div class="footer-note">ข้อมูลนี้บันทึกแบบใช้ร่วมกัน (shared) — ผู้ที่เปิดแดชบอร์ดนี้จะเห็นข้อมูลเดียวกันทั้งหมด</div>
    <datalist id="callStatusOptions">
      ${distinctValues('callStatus', CALL_STATUS).map(s=>`<option value="${s}">`).join("")}
    </datalist>
    <datalist id="depositStatusOptions">
      ${distinctValues('depositStatus', DEPOSIT_STATUS).map(s=>`<option value="${s}">`).join("")}
    </datalist>
  `;
  const content = document.getElementById("tabContent");
  if(state.tab==="daily") content.innerHTML = renderDaily();
  else if(state.tab==="daySummary") content.innerHTML = renderDaySummary();
  else content.innerHTML = renderMonthSummary();
  attachEvents();
}
function tabBtn(id,label){
  return `<button class="tab-btn ${state.tab===id?'active':''}" data-tab="${id}">${label}</button>`;
}

function renderDaily(){
  const dates = distinctDates();
  const list = recordsForDate(state.selectedDate);
  return `
  <div class="panel">
    <div class="section-title">เลือกวันที่ติดตาม</div>
    <div class="row">
      <div class="field"><label>วันที่</label><input type="date" id="dateInput" value="${state.selectedDate}"></div>
      <button class="btn" id="addRowBtn">+ เพิ่มลูกค้า</button>
      <span id="saveNote" class="save-note" style="align-self:center;">${state.saveMsg}</span>
    </div>
    ${dates.length? `<div class="chips">${dates.slice(0,20).map(d=>`
      <div class="chip ${d===state.selectedDate?'active':''}" data-jump-date="${d}">${thaiDate(d)}<span class="n">(${recordsForDate(d).length})</span></div>
    `).join("")}</div>` : ""}
  </div>
  <div class="panel">
    <div class="section-title">รายชื่อลูกค้า วันที่ ${thaiDate(state.selectedDate)}</div>
    ${list.length ? `
    <div class="table-scroll">
    <table>
      <thead><tr>
        <th>#</th><th>เบอร์โทร</th><th>ชื่อ-นามสกุล</th><th>ไอดีไลน์</th>
        <th>วันที่สมัคร</th><th>วันที่ตาม</th><th>สถานะโทร</th><th>สถานะฝาก</th>
        <th>ฝากบิลแรก</th><th>จำนวนบิล</th><th>บิลรวม</th><th>ปักหมุด</th><th></th>
      </tr></thead>
      <tbody>
        ${list.map((r,i)=>renderRow(r,i+1)).join("")}
      </tbody>
    </table>
    </div>
    ` : `<div class="empty">ยังไม่มีข้อมูลลูกค้าในวันนี้ — กด “+ เพิ่มลูกค้า” เพื่อเริ่มบันทึก</div>`}
  </div>`;
}

function renderRow(r, idx){
  return `
  <tr class="${r.pinned?'pinned':''}" data-id="${r.id}">
    <td>${idx}</td>
    <td><input type="text" data-field="phone" value="${r.phone||''}" placeholder="เบอร์โทร"></td>
    <td><input type="text" data-field="name" value="${r.name||''}" placeholder="ชื่อ-นามสกุล" style="min-width:130px;"></td>
    <td><input type="text" data-field="lineId" value="${r.lineId||''}" placeholder="ไอดีไลน์"></td>
    <td><input type="date" data-field="regDate" value="${r.regDate||''}"></td>
    <td><input type="date" data-field="followDate" value="${r.followDate||''}"></td>
    <td><input type="text" data-field="callStatus" list="callStatusOptions" value="${r.callStatus||''}" placeholder="สถานะโทร" style="min-width:110px;"></td>
    <td><input type="text" data-field="depositStatus" list="depositStatusOptions" value="${r.depositStatus||''}" placeholder="สถานะฝาก" style="min-width:110px;"></td>
    <td><input type="number" data-field="firstDeposit" value="${r.firstDeposit||''}" style="width:80px;"></td>
    <td><input type="number" data-field="billCount" value="${r.billCount||''}" style="width:60px;"></td>
    <td><input type="number" data-field="billTotal" value="${r.billTotal||''}" style="width:80px;"></td>
    <td><button class="btn tiny secondary" data-pin="${r.id}">${r.pinned?'★':'☆'}</button></td>
    <td><button class="btn tiny danger" data-del="${r.id}">ลบ</button></td>
  </tr>`;
}

function renderDaySummary(){
  const dates = distinctDates();
  const list = recordsForDate(state.selectedDate);
  const s = summarize(list);
  return `
  <div class="panel">
    <div class="section-title">เลือกวันที่สรุปผล</div>
    <div class="row">
      <div class="field"><label>วันที่</label><input type="date" id="dateInputSummary" value="${state.selectedDate}"></div>
    </div>
    ${dates.length? `<div class="chips">${dates.slice(0,20).map(d=>`
      <div class="chip ${d===state.selectedDate?'active':''}" data-jump-date="${d}">${thaiDate(d)}<span class="n">(${recordsForDate(d).length})</span></div>
    `).join("")}</div>` : ""}
  </div>
  <div class="panel">
    <div class="section-title">สรุปวันที่ ${thaiDate(state.selectedDate)}</div>
    ${list.length ? `
    <div class="stat-grid">
      <div class="stat-card"><div class="num">${s.count}</div><div class="lbl">ลูกค้าทั้งหมด</div></div>
      <div class="stat-card"><div class="num">${fmtNum(s.firstDeposit)}</div><div class="lbl">ยอดฝากบิลแรกรวม (บาท)</div></div>
      <div class="stat-card"><div class="num">${fmtNum(s.billCount)}</div><div class="lbl">จำนวนบิลรวม</div></div>
      <div class="stat-card"><div class="num">${fmtNum(s.billTotal)}</div><div class="lbl">บิลรวมวันครบกำหนดฝาก</div></div>
    </div>
    <div class="section-title">สถานะการโทร</div>
    ${barChart(s.call, s.count, CALL_COLOR)}
    <div class="section-title" style="margin-top:18px;">สถานะการฝาก</div>
    ${barChart(s.deposit, s.count, DEP_COLOR)}
    ` : `<div class="empty">ยังไม่มีข้อมูลของวันนี้</div>`}
  </div>`;
}

function barColorVar(cls){
  const map={gray:"var(--gray)",red:"var(--red)",green:"var(--green)",orange:"var(--orange)",blue:"var(--blue)",magenta:"var(--magenta)"};
  return map[cls]||"var(--gold)";
}
function barChart(obj, total, colorMap){
  const entries = Object.entries(obj);
  if(!entries.some(([,v])=>v>0)) return `<div class="empty" style="padding:14px;">ไม่มีข้อมูลสถานะ</div>`;
  return entries.map(([k,v])=>{
    const pct = total ? Math.round((v/total)*100) : 0;
    const cls = colorMap[k]||"gray";
    return `<div class="bar-row">
      <div class="bar-label">${k}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${barColorVar(cls)};"></div></div>
      <div class="bar-val">${v}</div>
    </div>`;
  }).join("");
}

function renderMonthSummary(){
  const months = distinctMonths();
  const list = recordsForMonth(state.selectedMonth);
  const s = summarize(list);
  const daysInMonth = {};
  list.forEach(r=>{
    const d = r.followDate;
    if(!d) return;
    daysInMonth[d] = daysInMonth[d] || {count:0, billTotal:0};
    daysInMonth[d].count++;
    daysInMonth[d].billTotal += Number(r.billTotal)||0;
  });
  const dayRows = Object.keys(daysInMonth).sort();
  return `
  <div class="panel">
    <div class="section-title">เลือกเดือนสรุปผล</div>
    <div class="row">
      <div class="field"><label>เดือน</label><input type="month" id="monthInput" value="${state.selectedMonth}"></div>
    </div>
    ${months.length? `<div class="chips">${months.slice(0,12).map(m=>`
      <div class="chip ${m===state.selectedMonth?'active':''}" data-jump-month="${m}">${thaiMonth(m)}<span class="n">(${recordsForMonth(m).length})</span></div>
    `).join("")}</div>` : ""}
  </div>
  <div class="panel">
    <div class="section-title">สรุปเดือน ${thaiMonth(state.selectedMonth)}</div>
    ${list.length ? `
    <div class="stat-grid">
      <div class="stat-card"><div class="num">${s.count}</div><div class="lbl">ลูกค้าทั้งหมด</div></div>
      <div class="stat-card"><div class="num">${fmtNum(s.firstDeposit)}</div><div class="lbl">ยอดฝากบิลแรกรวม (บาท)</div></div>
      <div class="stat-card"><div class="num">${fmtNum(s.billCount)}</div><div class="lbl">จำนวนบิลรวม</div></div>
      <div class="stat-card"><div class="num">${fmtNum(s.billTotal)}</div><div class="lbl">บิลรวมวันครบกำหนดฝาก</div></div>
    </div>
    <div class="section-title">สถานะการโทร (ทั้งเดือน)</div>
    ${barChart(s.call, s.count, CALL_COLOR)}
    <div class="section-title" style="margin-top:18px;">สถานะการฝาก (ทั้งเดือน)</div>
    ${barChart(s.deposit, s.count, DEP_COLOR)}
    <div class="section-title" style="margin-top:18px;">รายละเอียดรายวันในเดือนนี้</div>
    <div class="table-scroll">
    <table>
      <thead><tr><th>วันที่</th><th>จำนวนลูกค้า</th><th>บิลรวมวันครบกำหนดฝาก</th><th></th></tr></thead>
      <tbody>
        ${dayRows.map(d=>`<tr>
          <td>${thaiDate(d)}</td>
          <td>${daysInMonth[d].count}</td>
          <td>${fmtNum(daysInMonth[d].billTotal)}</td>
          <td><button class="btn tiny secondary" data-jump-date="${d}" data-goto-daily="1">ดูรายวัน</button></td>
        </tr>`).join("")}
      </tbody>
    </table>
    </div>
    ` : `<div class="empty">ยังไม่มีข้อมูลในเดือนนี้</div>`}
  </div>`;
}

function attachEvents(){
  document.querySelectorAll(".tab-btn").forEach(b=>{
    b.onclick = ()=>{ state.tab = b.dataset.tab; render(); };
  });
  const dateInput = document.getElementById("dateInput") || document.getElementById("dateInputSummary");
  if(dateInput){
    dateInput.onchange = e=>{ state.selectedDate = e.target.value; render(); };
  }
  const monthInput = document.getElementById("monthInput");
  if(monthInput){
    monthInput.onchange = e=>{ state.selectedMonth = e.target.value; render(); };
  }
  document.querySelectorAll("[data-jump-date]").forEach(el=>{
    el.addEventListener("click", ()=>{
      state.selectedDate = el.dataset.jumpDate;
      if(el.dataset.gotoDaily) state.tab = "daily";
      render();
    });
  });
  document.querySelectorAll("[data-jump-month]").forEach(el=>{
    el.onclick = ()=>{ state.selectedMonth = el.dataset.jumpMonth; render(); };
  });
  const addBtn = document.getElementById("addRowBtn");
  if(addBtn) addBtn.onclick = ()=> addRecord(state.selectedDate);

  document.querySelectorAll("tbody tr[data-id]").forEach(tr=>{
    const id = tr.dataset.id;
    tr.querySelectorAll("[data-field]").forEach(inp=>{
      inp.addEventListener("change", e=>{
        updateRecord(id, inp.dataset.field, e.target.value);
      });
    });
    const pinBtn = tr.querySelector("[data-pin]");
    if(pinBtn) pinBtn.onclick = ()=> togglePin(id);
    const delBtn = tr.querySelector("[data-del]");
    if(delBtn) delBtn.onclick = ()=>{
      if(confirm("ยืนยันการลบข้อมูลลูกค้ารายนี้?")) deleteRecord(id);
    };
  });
}

loadData();
</script>
</body>
</html>
